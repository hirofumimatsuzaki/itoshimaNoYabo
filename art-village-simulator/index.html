<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>糸島 芸術村シミュレーター</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script defer src="./sketch.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #dbeee3;
      --bg-bottom: #f7f0df;
      --panel: rgba(255, 251, 244, 0.92);
      --ink: #243027;
      --accent: #7c9a62;
      --accent-strong: #49633c;
      --line: rgba(51, 73, 45, 0.18);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.65), transparent 38%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      color: var(--ink);
    }

    main {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    canvas {
      border-radius: 22px;
      box-shadow: 0 22px 60px rgba(36, 48, 39, 0.18);
    }
  </style>
</head>
<body>
  <main id="app"></main>
</body>
</html>
